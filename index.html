<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; min-height: 100vh;
  background: #0d0d1a;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
}

/* CONFETTI CANVAS */
#confetti-canvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* PAGE LAYOUT */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  gap: 16px;
}

/* BADGE */
.badge {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 99px;
  padding: 5px 16px;
}

/* HAPPY BIRTHDAY TEXT */
.hb {
  font-family: 'Pacifico', cursive;
  font-size: clamp(28px, 8vw, 56px);
  background: linear-gradient(90deg, #ff6bcb, #ffb347, #ffec6e, #ff6bcb);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradMove 4s linear infinite;
}
@keyframes gradMove {
  0%   { background-position: 0%; }
  100% { background-position: 200%; }
}

/* NAME */
.name {
  font-family: 'Pacifico', cursive;
  font-size: clamp(48px, 14vw, 88px);
  color: #fff;
  line-height: 1;
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { text-shadow: 0 0 20px rgba(255,160,80,0.5), 0 0 50px rgba(255,80,160,0.3); }
  50%      { text-shadow: 0 0 40px rgba(255,160,80,0.9), 0 0 90px rgba(255,80,160,0.6); }
}

/* CAKE */
.cake {
  font-size: clamp(48px, 14vw, 72px);
  animation: floatUp 2.5s ease-in-out infinite;
  line-height: 1;
}
@keyframes floatUp {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-10px); }
}

/* EMOJI ROW */
.emojis {
  display: flex;
  gap: 12px;
  justify-content: center;
  font-size: clamp(22px, 6vw, 30px);
}
.emojis span { display: inline-block; animation: sway 1.8s ease-in-out infinite; }
.emojis span:nth-child(1) { animation-delay: 0.0s; }
.emojis span:nth-child(2) { animation-delay: 0.3s; }
.emojis span:nth-child(3) { animation-delay: 0.6s; }
.emojis span:nth-child(4) { animation-delay: 0.9s; }
.emojis span:nth-child(5) { animation-delay: 1.2s; }
@keyframes sway {
  0%,100% { transform: rotate(-8deg); }
  50%      { transform: rotate(8deg); }
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 20px 24px;
  max-width: 360px;
  width: 100%;
}
.card p {
  font-size: clamp(14px, 3.8vw, 16px);
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
  font-style: italic;
}
.card .sig {
  margin-top: 12px;
  font-size: 15px;
  color: #ff6bcb;
  font-weight: 700;
  font-style: normal;
}

/* SURPRISE BUTTON */
.btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}

.surprise-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: min(80vw, 300px);
  padding: 16px 24px;
  border-radius: 99px;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(15px, 4vw, 18px);
  font-weight: 900;
  color: #111;
  text-decoration: none;
  background: linear-gradient(135deg, #ffec6e, #ffb347, #ff6bcb);
  animation: btnGlow 2.5s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
@keyframes btnGlow {
  0%,100% { box-shadow: 0 0 16px rgba(255,180,80,0.5), 0 0 36px rgba(255,100,180,0.25); }
  50%      { box-shadow: 0 0 28px rgba(255,180,80,0.85), 0 0 60px rgba(255,100,180,0.5); }
}
.surprise-btn:active { transform: scale(0.96); }

.hint {
  font-size: 12px;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.06em;
  animation: blink 3s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 0.9; }
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="page">
  <div class="badge">🎊 a special message for you</div>
  <div class="hb">Happy Birthday</div>
  <div class="name">Tanya!</div>
  <div class="cake">🎂</div>
  <div class="emojis">
    <span>🎈</span><span>🌸</span><span>✨</span><span>🥂</span><span>🎁</span>
  </div>
  <div class="card">
    <p>"You make every moment more fun, every laugh louder, and every memory more precious. I'm so lucky to call you my best friend."</p>
    <p class="sig">— With all the love 💛</p>
  </div>
  <div class="btn-wrap">
    <a class="surprise-btn" href="YOUR_VIDEO_LINK_HERE" target="_blank">
      🎁 Tap here for a surprise!
    </a>
    <p class="hint">✨ something special is waiting for you ✨</p>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  const COLORS = ['#ff6bcb','#ffb347','#ffec6e','#a78bfa','#60d9fa','#86efac','#f9a8d4'];
  let W = 0, H = 0;
  let pieces = [];
  let burstFired = false;

  function setSize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  setSize();
  window.addEventListener('resize', setSize);

  function randColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }

  // Burst on load — fires once, pieces decay and vanish
  function burst() {
    const cx = W / 2, cy = H * 0.38;
    for (let i = 0; i < 70; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = Math.random() * 7 + 2;
      pieces.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - 4,
        w: Math.random() * 8 + 4,
        h: Math.random() * 4 + 2,
        rot: Math.random() * Math.PI * 2,
        rspd: (Math.random() - 0.5) * 0.15,
        color: randColor(),
        alpha: 1,
        decay: 0.013 + Math.random() * 0.007,
        gravity: 0.2,
        isBurst: true
      });
    }
  }

  // Gentle ambient floaters — loop forever, simple circles
  const floaters = Array.from({ length: 20 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 2.5 + 1,
    color: randColor(),
    vy: -(Math.random() * 0.4 + 0.1),
    alpha: Math.random() * 0.3 + 0.1
  }));

  function drawRect(p) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);

    // Floaters
    for (const f of floaters) {
      f.y += f.vy;
      if (f.y < -10) { f.y = H + 5; f.x = Math.random() * W; }
      ctx.globalAlpha = f.alpha;
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Burst pieces — update and remove when invisible
    for (let i = pieces.length - 1; i >= 0; i--) {
      const p = pieces[i];
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.99;
      p.rot += p.rspd;
      p.alpha -= p.decay;
      if (p.alpha <= 0) { pieces.splice(i, 1); continue; }
      drawRect(p);
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }

  tick();
  setTimeout(burst, 300);
})();
</script>
</body>
</html>
