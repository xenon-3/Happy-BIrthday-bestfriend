<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    min-height: 100dvh;
    overflow-x: hidden;
    font-family: 'Nunito', sans-serif;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.2rem 2.5rem;
    text-align: center;
    gap: 0;
  }

  .from-badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 5px 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .headline {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 9vw, 4rem);
    line-height: 1.1;
    background: linear-gradient(135deg, #ff6bcb 0%, #ffb347 40%, #ffec6e 70%, #ff6bcb 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease infinite;
    margin-bottom: 0.3rem;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .name {
    font-family: 'Pacifico', cursive;
    font-size: clamp(3rem, 13vw, 5.5rem);
    color: #fff;
    text-shadow: 0 0 30px rgba(255,180,80,0.6), 0 0 60px rgba(255,100,180,0.4);
    margin-bottom: 0.8rem;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 30px rgba(255,180,80,0.6), 0 0 60px rgba(255,100,180,0.4); }
    50% { text-shadow: 0 0 50px rgba(255,180,80,0.9), 0 0 100px rgba(255,100,180,0.6); }
  }

  .cake-wrap {
    font-size: clamp(3rem, 12vw, 4.5rem);
    margin: 0.4rem 0 0.8rem;
    animation: bounce 1.4s ease-in-out infinite;
    filter: drop-shadow(0 6px 16px rgba(255,150,80,0.5));
    display: block;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .emoji-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .emoji-row span {
    display: inline-block;
    animation: wiggle 1s ease-in-out infinite;
  }
  .emoji-row span:nth-child(2) { animation-delay: 0.15s; }
  .emoji-row span:nth-child(3) { animation-delay: 0.3s; }
  .emoji-row span:nth-child(4) { animation-delay: 0.45s; }
  .emoji-row span:nth-child(5) { animation-delay: 0.6s; }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.15); }
  }

  .wish-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 1rem 1.3rem;
    width: 100%;
    max-width: 400px;
    margin-bottom: 2rem;
  }

  .wish-card p {
    font-size: clamp(0.85rem, 3.5vw, 1rem);
    color: rgba(255,255,255,0.65);
    line-height: 1.65;
    font-style: italic;
  }

  .wish-card .signature {
    margin-top: 0.7rem;
    font-size: 0.9rem;
    color: #ff6bcb;
    font-weight: 700;
    font-style: normal;
  }

  /* ---- SURPRISE BUTTON ---- */
  .surprise-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    width: 100%;
  }

  .surprise-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: min(85vw, 340px);
    padding: 1.1rem 1.5rem;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1rem, 4.5vw, 1.25rem);
    font-weight: 900;
    color: #0d0d1a;
    background: linear-gradient(135deg, #ffec6e, #ffb347, #ff6bcb, #ffec6e);
    background-size: 300% 300%;
    border: none;
    border-radius: 80px;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.02em;
    animation: btn-shimmer 2s linear infinite, btn-breathe 1.6s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes btn-shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  @keyframes btn-breathe {
    0%, 100% { box-shadow: 0 0 0 4px rgba(255,180,80,0.25), 0 0 0 8px rgba(255,100,180,0.15), 0 0 30px rgba(255,180,80,0.6), 0 0 60px rgba(255,100,180,0.35); }
    50% { box-shadow: 0 0 0 7px rgba(255,180,80,0.35), 0 0 0 14px rgba(255,100,180,0.2), 0 0 55px rgba(255,180,80,0.9), 0 0 100px rgba(255,100,180,0.5); }
  }

  .surprise-btn:active { transform: scale(0.95); }

  .ring {
    position: absolute;
    border-radius: 80px;
    border: 2px solid rgba(255,180,80,0.5);
    inset: 0;
    animation: ring-out 2s ease-out infinite;
    pointer-events: none;
  }
  .ring:nth-child(2) { animation-delay: 0.8s; }

  @keyframes ring-out {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .surprise-hint {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.05em;
    animation: hint-fade 2s ease-in-out infinite;
  }

  @keyframes hint-fade {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="page">
  <div class="from-badge">🎊 A special message for you</div>
  <div class="headline">Happy Birthday</div>
  <div class="name">Tanya!</div>
  <span class="cake-wrap">🎂</span>
  <div class="emoji-row">
    <span>🎈</span><span>🌸</span><span>✨</span><span>🥂</span><span>🎁</span>
  </div>
  <div class="wish-card">
    <p>"You make every moment more fun, every laugh louder, and every memory more precious. I'm so lucky to call you my best friend."</p>
    <p class="signature">— With all the love 💛</p>
  </div>
  <div class="surprise-wrap">
    <a class="surprise-btn" href="YOUR_VIDEO_LINK_HERE" target="_blank">
      <div class="ring"></div>
      <div class="ring"></div>
      🎁 Tap here for a surprise!
    </a>
    <p class="surprise-hint">✨ something special is waiting for you... ✨</p>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#ff6bcb','#ffb347','#ffec6e','#a78bfa','#60d9fa','#f9a8d4','#86efac','#ff9f9f','#c4b5fd'];

const ambient = Array.from({length: 45}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 3.5 + 1.5,
  color: COLORS[Math.floor(Math.random() * COLORS.length)],
  vx: (Math.random() - 0.5) * 0.7,
  vy: -(Math.random() * 0.7 + 0.2),
  alpha: Math.random() * 0.45 + 0.15,
  spin: (Math.random() - 0.5) * 0.07,
  angle: Math.random() * Math.PI * 2,
  shape: Math.floor(Math.random() * 3)
}));

let burst = [];

function launchBurst() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.45;

  for (let i = 0; i < 160; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 12 + 3;
    burst.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 5,
      r: Math.random() * 5 + 2,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: 1, spin: (Math.random() - 0.5) * 0.22,
      angle: Math.random() * Math.PI * 2,
      shape: Math.floor(Math.random() * 3), gravity: 0.32
    });
  }

  [0, window.innerWidth].forEach((sx, i) => {
    for (let j = 0; j < 60; j++) {
      const dir = i === 0 ? 1 : -1;
      const angle = (Math.random() * 0.8 - 0.4);
      const speed = Math.random() * 10 + 5;
      burst.push({
        x: sx, y: window.innerHeight * 0.25,
        vx: Math.cos(angle) * speed * dir,
        vy: Math.sin(angle) * speed - 3,
        r: Math.random() * 4 + 2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: 1, spin: (Math.random() - 0.5) * 0.18,
        angle: Math.random() * Math.PI * 2,
        shape: Math.floor(Math.random() * 3), gravity: 0.28
      });
    }
  });
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle = p.color;
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  if (p.shape === 0) {
    ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill();
  } else if (p.shape === 1) {
    ctx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
  } else {
    ctx.beginPath();
    ctx.moveTo(0, -p.r * 1.5); ctx.lineTo(p.r, p.r); ctx.lineTo(-p.r, p.r);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const p of ambient) {
    p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.vy += 0.004;
    if (p.y < -20) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; p.vy = -(Math.random() * 0.7 + 0.2); }
    if (p.x < -20) p.x = canvas.width + 10;
    if (p.x > canvas.width + 20) p.x = -10;
    drawParticle(p);
  }

  burst = burst.filter(p => p.alpha > 0.02);
  for (const p of burst) {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.99;
    p.angle += p.spin; p.alpha -= 0.013;
    drawParticle(p);
  }

  requestAnimationFrame(loop);
}

loop();
setTimeout(launchBurst, 300);
setTimeout(launchBurst, 1600);
</script>
</body>
</html>
